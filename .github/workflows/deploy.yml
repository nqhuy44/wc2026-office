name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "prisma/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vm-deploy
  cancel-in-progress: false

env:
  BACKEND_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/wcleague-api
  FRONTEND_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/wcleague-dashboard

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      short_sha: ${{ steps.tag.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        id: tag
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.short_sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.short_sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-push
    environment: prod

    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/${{ secrets.VM_USER }}/wc-league

            echo "==> Pinning image tags to ${{ needs.build-push.outputs.short_sha }}..."
            sed -i "s|image: docker.io/.*/wcleague-api:.*|image: docker.io/${{ vars.DOCKERHUB_USERNAME }}/wcleague-api:${{ needs.build-push.outputs.short_sha }}|" docker-compose.yml
            sed -i "s|image: docker.io/.*/wcleague-dashboard:.*|image: docker.io/${{ vars.DOCKERHUB_USERNAME }}/wcleague-dashboard:${{ needs.build-push.outputs.short_sha }}|" docker-compose.yml

            echo "==> Pulling new images..."
            docker compose -f docker-compose.yml pull migrate api dashboard

            echo "==> Starting services..."
            docker compose -f docker-compose.yml up -d

            echo "==> Pruning old images..."
            docker image prune -f