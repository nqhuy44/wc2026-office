services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fan_league
      POSTGRES_PASSWORD: fan_league
      POSTGRES_DB: fan_league
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fan_league -d fan_league"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
